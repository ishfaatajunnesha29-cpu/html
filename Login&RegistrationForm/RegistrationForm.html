
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body{
            font-family: serif;
            background-color:#e6f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }
         .b1{
            background-color: goldenrod;
            width: 150px;
            height: 30px;
           
           
           }
        .b2{
            background-color: goldenrod;
            width: 150px;
            height: 30px;
            margin-left: 180px;
           
           }
           label
          {
            font-weight: 450;
            font-style: normal;
            color: black;
           }
           .b1:hover{
background:darkgreen;
}
.b2:hover{
    background-color: darkgreen;

}
h3{
    text-align: center;
    font-family: serif;
    font-weight: bold;
}
       
    </style>
</head>
<body>
    <div class="one">
    <h3>Registration Form</h3>
    <form action="">
    <label for="name">Name : </label>
    <input type="text" name="" id="name"><br><br>
    <label for="email">Enter your MailId : </label>
    <input type="email" name="" id="email"><br><br>
    <label for="username">Username : </label>
    <input type="text" name="" id="username"><br><br>
    <label for="password">Password : </label>
    <input type="password" name="" id="password"><br><br>
    <label for="confirm"> Confirm Password : </label>
    <input type="password" name="" id="confirm"><br><br>
    <input type="radio" name="gender" id="male">
    <label for="male">Male</label><br><br>
    <input type="radio" name="gender" id="female">
    <label for="female">Female</label><br><br>
    <label for="dob">Date of Birth : </label>
    <input type="date" name="" id="dob"><br><br>
    <label for="mobileNumber">Mobile Number : </label>
    <input type="number" name="" id="mobileNumber" ><br><br>
    <label for="course">Course Selection</label>
    <select name="" id="course">
        <option value="">Java</option>
        <option value="">Python</option>
        <option value="">Web development</option>
    </select><br><br>
    <label for="address">Address</label>
    <textarea placeholder="Enter your Address" rows="8" cols="50" id="address"></textarea><br><br><br>
    <input type="checkbox">Accept Terms & Conditions <br><br><br>
    <button type="submit" class="b1">Register</button>
    <button type="reset" class="b2">reset</button>
</form>
</div>

</body>
</html>
